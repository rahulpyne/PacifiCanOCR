name: Mirror to DigitizationStudio

# Continuously mirrors this repo to PacifiCan/DigitizationStudio on every push.
#
# Required repo secret (Settings → Secrets and variables → Actions):
#   MIRROR_TOKEN  A token with write (Contents: Read and write) access to
#                 PacifiCan/DigitizationStudio. Use a fine-grained PAT scoped to
#                 that repo, or a classic PAT with the `repo` scope.

on:
  push:
    branches: ['**']
    tags: ['**']
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to mirror
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          remote="https://x-access-token:${MIRROR_TOKEN}@github.com/PacifiCan/DigitizationStudio.git"
          # Push the branch/tag that triggered this run to the same ref name.
          git push --force "$remote" "HEAD:${GITHUB_REF#refs/*/}"
          # Keep tags in sync too.
          git push --force --tags "$remote"
