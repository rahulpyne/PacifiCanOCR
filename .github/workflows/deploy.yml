name: Build and deploy to Azure Web App

# Deploys the container to Azure App Service on every push to main.
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   ACR_LOGIN_SERVER       e.g. pacificanacr.azurecr.io
#   ACR_USERNAME           ACR admin username
#   ACR_PASSWORD           ACR admin password
#   AZURE_WEBAPP_NAME      e.g. pacifican-parse-studio
#   AZURE_CLIENT_ID        user-assigned managed identity client ID
#   AZURE_TENANT_ID        Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID  Azure subscription ID

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: parse-studio

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy container to Azure Web App
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az webapp config container set \
              --name ${{ secrets.AZURE_WEBAPP_NAME }} \
              --resource-group PacificanOCR \
              --docker-custom-image-name ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
              --docker-registry-server-url https://${{ secrets.ACR_LOGIN_SERVER }} \
              --docker-registry-server-user ${{ secrets.ACR_USERNAME }} \
              --docker-registry-server-password ${{ secrets.ACR_PASSWORD }}

            az webapp restart \
              --name ${{ secrets.AZURE_WEBAPP_NAME }} \
              --resource-group PacificanOCR
