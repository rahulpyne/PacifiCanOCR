name: Build and deploy to Azure Web App

# Deploys the container to Azure App Service on every push to main.
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   ACR_LOGIN_SERVER          e.g. pacificanacr.azurecr.io
#   ACR_USERNAME              ACR admin username
#   ACR_PASSWORD              ACR admin password
#   AZURE_WEBAPP_NAME         e.g. pacifican-parse-studio
#   AZURE_WEBAPP_PUBLISH_PROFILE   contents of the downloaded .publishsettings
#
# The storage connection string is configured directly on the Web App as the
# ADLS_CONNECTION_STRING app setting (see docs/AZURE.md) — it is NOT needed here.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: parse-studio

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
